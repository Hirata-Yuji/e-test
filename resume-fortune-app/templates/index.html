<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>履歴書占術鑑定 - 四柱推命・九星気学・人相学</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>履歴書占術鑑定</h1>
            <p class="subtitle">四柱推命・九星気学・人相学による総合人物鑑定</p>
        </header>

        <main>
            <section class="upload-section">
                <form id="upload-form" enctype="multipart/form-data">
                    <div class="upload-area" id="drop-area">
                        <div class="upload-icon">&#128196;</div>
                        <p>履歴書PDFをドラッグ＆ドロップ</p>
                        <p class="upload-hint">またはクリックしてファイルを選択（人相学鑑定に使用）</p>
                        <input type="file" id="pdf-input" name="pdf" accept=".pdf" hidden>
                        <div class="file-name" id="file-name"></div>
                    </div>

                    <div class="manual-input">
                        <h3>生年月日・性別の入力（必須）</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="birthdate">生年月日</label>
                                <input type="date" id="birthdate" name="birthdate" required>
                            </div>
                            <div class="form-group">
                                <label for="gender">性別</label>
                                <select id="gender" name="gender">
                                    <option value="auto">不明</option>
                                    <option value="男">男性</option>
                                    <option value="女">女性</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        鑑定を開始する
                    </button>
                </form>
            </section>

            <!-- ローディング -->
            <section class="loading-section" id="loading" style="display:none;">
                <div class="loading-spinner"></div>
                <p class="loading-text" id="loading-text">鑑定中です...</p>
            </section>

            <!-- エラー -->
            <section class="error-section" id="error" style="display:none;">
                <div class="error-message" id="error-message"></div>
            </section>

            <!-- 結果セクション -->
            <section class="results-section" id="results" style="display:none;">
                <h2>鑑定結果</h2>
                <div class="result-meta" id="result-meta"></div>

                <div class="tab-nav">
                    <button class="tab-btn active" data-tab="combined">総合鑑定</button>
                    <button class="tab-btn" data-tab="shichusuimei">四柱推命</button>
                    <button class="tab-btn" data-tab="kyusei">九星気学</button>
                    <button class="tab-btn" data-tab="face">人相学</button>
                </div>

                <div class="tab-content active" id="tab-combined">
                    <div class="result-card combined-card">
                        <h3>総合人物鑑定</h3>
                        <div id="combined-result" class="result-text">
                            <p id="combined-loading">AI鑑定を実行中...</p>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="tab-shichusuimei">
                    <div class="result-card">
                        <h3>命式（四柱）</h3>
                        <div id="pillars-table"></div>
                    </div>
                    <div class="result-card">
                        <h3>日主の性格</h3>
                        <div id="nichi-personality"></div>
                    </div>
                    <div class="result-card">
                        <h3>五行バランス</h3>
                        <div id="gogyo-balance"></div>
                        <div id="gogyo-analysis"></div>
                    </div>
                    <div class="result-card">
                        <h3>通変星・十二運</h3>
                        <div id="tsuhensei-table"></div>
                    </div>
                    <div class="result-card">
                        <h3>大運</h3>
                        <div id="daiun-table"></div>
                    </div>
                </div>

                <div class="tab-content" id="tab-kyusei">
                    <div class="result-card">
                        <h3>九星</h3>
                        <div id="kyusei-stars"></div>
                    </div>
                    <div class="result-card">
                        <h3>本命星の詳細</h3>
                        <div id="honmei-detail"></div>
                    </div>
                    <div class="result-card">
                        <h3>月命星・日命星</h3>
                        <div id="getsu-nichi-detail"></div>
                    </div>
                </div>

                <div class="tab-content" id="tab-face">
                    <div class="result-card">
                        <h3>人相学鑑定</h3>
                        <div id="face-result">
                            <p id="face-loading">AI鑑定を実行中...</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p class="disclaimer">※本鑑定は東洋占術に基づいたエンターテイメントです。実際の採用判断には使用しないでください。</p>
        </footer>
    </div>

    <script>
        const API_KEY = "{{ api_key }}";
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
